spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/lowcode?sslmode=disable&stringtype=unspecified
spring.datasource.username=lowcode
spring.datasource.password=lowcode
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Tests skip auth so existing suites keep working (AuthControllerTest overrides to true)
lowcode.auth.enabled=false

# Must mirror main: test classpath application.properties replaces main entirely
sa-token.token-name=Authorization
sa-token.token-prefix=Bearer
sa-token.timeout=86400
sa-token.is-read-header=true
sa-token.is-read-cookie=false
sa-token.is-print=false
