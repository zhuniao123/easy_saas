spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/lowcode?sslmode=disable&stringtype=unspecified
spring.datasource.username=lowcode
spring.datasource.password=lowcode
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# v1.2 RBAC
lowcode.auth.enabled=true
sa-token.token-name=Authorization
sa-token.token-prefix=Bearer
sa-token.timeout=86400
sa-token.is-read-header=true
sa-token.is-read-cookie=false
sa-token.is-print=false

# v1.6 multi-datasource crypto (Base64 or 64-hex AES-256 key). Prefer env LOWCODE_DS_CRYPTO_KEY.
# Production MUST set a strong key; empty falls back to a local-dev derived key (WARN).
lowcode.datasource.crypto-key=${LOWCODE_DS_CRYPTO_KEY:}
